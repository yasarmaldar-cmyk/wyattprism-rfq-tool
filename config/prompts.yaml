      },
      "frameworks": {
        "detected": ["list of frameworks explicitly mentioned in the document"],
        "implied": ["list of frameworks implied but not explicitly named"],
        "recommended_frameworks": ["list of frameworks recommended based on the org's sector — ONLY populate if no frameworks are detected"],
        "no_framework_detected": true/false,
        "framework_notes": "string — reasoning for recommendations, or specific framework requirements mentioned"
      },
      "timeline": {
