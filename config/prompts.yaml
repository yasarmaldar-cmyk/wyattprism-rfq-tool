      "report_type": "Annual Report | Integrated Annual Report | Sustainability Report | ESG Report | Corporate Brochure | Other",
      "scope_of_work": {
        "description": "string — brief summary of what needs to be done",
        "deliverables": ["list of concrete deliverables"],
        "print_specs": {
          "page_count": "string or null",
          "copies": "string or null",
          "paper_gsm": "string or null",
          "binding": "string or null",
